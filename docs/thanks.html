<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danke! - Agentic Coding Meetup Hamburg</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --border: #2a2a3e;
      --text: #e8e8f0;
      --text-muted: #8888a0;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --success: #00cec9;
      --white: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.6;
    }
    .container {
      max-width: 520px;
      text-align: center;
      padding: 2rem 1.5rem;
    }
    .check {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(0, 206, 201, 0.15);
      color: var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--white), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }
    .cta {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: var(--accent);
      color: var(--white);
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .cta:hover {
      background: #5a4bd4;
      transform: translateY(-1px);
    }
    .secondary {
      display: block;
      margin-top: 1rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .secondary a {
      color: var(--accent-light);
      text-decoration: none;
    }
    .secondary a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="check">&#10003;</div>
    <h1>Vielen Dank!</h1>
    <p>Dein Feedback hilft uns, die kommenden Meetups noch besser zu gestalten. Wir freuen uns, dich beim nächsten Mal wieder zu sehen!</p>
    <a href="https://luma.com/AgenticCodingMeetup" class="cta">Nächste Events ansehen</a>
    <span class="secondary">Organisiert von <a href="https://luma.com/AgenticCodingMeetup">Agentic Coding Meetup Hamburg</a></span>
  </div>
</body>
</html>
